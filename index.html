<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/defaee709d.js" crossorigin="anonymous"></script>
</head>

<body>
    
    <div>
        <div class="firstDiv">
            <h1 id="newPass"></h1>
            <i class="fa-regular fa-copy" id="copy-btn"></i>
            <span id="copyMsg">Copied!</span>
        </div>

        <div class="secondDiv">
            <input id="range" type="range" min="6" max="20">
            <p id="rangeVal"></p>
        </div>

        <div class="thirdDiv">
            <input type="checkbox" name="UpperCase" id="upper">
            <label for="upper">UpperCase</label>
            <br>
            <input type="checkbox" name="LowerCase" id="lower">
            <label for="lower">LowerCase</label>
            <br>
            <input type="checkbox" name="Numbers" id="numbers">
            <label for="numbers">Numbers</label>
            <br>
            <input type="checkbox" name="Symbols" id="symbols">
            <label for="symbols">Symbols</label>
        </div>

        <button id="btn">
            Generate Password
        </button>
    </div>


    <script src="index.js"></script>    
</body>
</html>
